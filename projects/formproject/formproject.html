<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link rel="stylesheet" href="formproject.css">
</head>
<body>
    <header>
        <h1>Comic Con 2026</h1>
    </header>
    <main>
        <div id="message"></div>
        <form action="formproject2.html" method="GET" id="formproject">
            <fieldset>
                <legend>Sign Up for Comic Con!</legend>
                <div class="form-row">
                    <label for="fullname">Name: </label>
                    <input type="text" name="fullname" id="fullname" required>
                </div>
                <div class="form-row">
                    <label for="email">Email: </label>
                    <input type="email" name="email" id="email" placeholder="name@email.com" required>
                </div>
                <div class="form-row">
                    <label for="pass">Password: </label>
                    <input type="password" name="pass" id="pass" required>
                </div>
                <div class="form-row">
                    <label for="age">Age: </label>
                    <input type="number" name="age" id="age" required>
                </div>
                <div class="check-row">
                    <div class="spacer">Gender:</div>
                    <label><input type="radio" name="gender" value="male"> Male</label>
                    <label><input type="radio" name="gender" value="female"> Female</label>
                </div>
                <div class="form-row">
                    <label for="daypass">Day Pass Group: </label>
                    <select name="daypass" id="daypass" required>
                        <option value="blank"> ----- </option>
                        <option value="Silver">Silver</option>
                        <option value="Gold">Gold</option>
                        <option value="Platinum">Platinum</option>
                    </select>
                </div>
                <div class="form-row">
                    <label for="comments">Comments</label>
                    <textarea name="comments" id="comments">Pre-filled in</textarea>
                </div>
                <div class="check-row">
                    <div class="spacer"></div>
                    <label><input type="checkbox" name="gender" value="male" checked> Receive notifs about the event?</label>
                </div>
                <div class="form-row">
                    <div class="spacer"></div>
                    <input type="submit" value="Sign Up">
                </div>
            </fieldset>
        </form>
    </main>
    <footer>
        <p>&copy; Hatada, Zeph Kentaro</p>
    </footer>
    <script src="formproject.js"></script>
</body>
</html>
